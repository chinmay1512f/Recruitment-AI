<!DOCTYPE html>
<html>
<head>
    <title>Analysis History</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="dashboard-wrapper">

    <header class="dashboard-header">
        <div>
            <h1>Analysis History</h1>
            <p>Previously executed job analyses</p>
        </div>
        <a href="/upload" class="btn-outline">Back</a>
    </header>

    <section class="table-card">
        <table class="enterprise-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Job Title</th>
                    <th>Skills</th>
                    <th>Min Experience</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for job in jobs %}
                <tr>
                    <td>{{ job.id }}</td>
                    <td>{{ job.job_title }}</td>
                    <td>{{ job.required_skills }}</td>
                    <td>{{ job.min_experience }} yrs</td>
                    <td>{{ job.created_at.strftime("%Y-%m-%d %H:%M") }}</td>
                    <td>
                        <a href="/history/{{ job.id }}" class="btn-action">
                            View Results
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </section>

</div>

</body>
</html>
